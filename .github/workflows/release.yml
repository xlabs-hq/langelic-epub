name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.16"]
        # `use-cross` must be OMITTED (not set to `false`) on entries that
        # should not use cross. The action's `if:` guard reads the input as a
        # string, and literal "false" is a truthy string in GitHub Actions
        # expressions — so only an absent value (empty string → falsy) causes
        # the cross install step to be skipped.
        job:
          - { target: aarch64-apple-darwin,      os: macos-14 }
          # macos-13 (Intel) is deprecated and stuck queueing indefinitely.
          # macos-15-intel is GitHub's current Intel-darwin runner.
          - { target: x86_64-apple-darwin,       os: macos-15-intel }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-22.04 }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-22.04, use-cross: true }

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.job.target }}

      - name: Extract project version
        id: version
        shell: bash
        run: |
          # Strip the leading `v` from the tag (v0.1.0 → 0.1.0) so
          # rustler-precompiled-action doesn't produce artifact names like
          # `…-vv0.1.0-…`.
          version="${GITHUB_REF_NAME#v}"
          echo "project-version=$version" >> "$GITHUB_OUTPUT"

      - uses: philss/rustler-precompiled-action@v1.1.5
        id: build-crate
        with:
          project-name: langelic_epub
          project-version: ${{ steps.version.outputs.project-version }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-dir: native/langelic_epub

      - name: Publish to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build-crate.outputs.file-path }}

  # Regenerates the precompiled-NIF checksum file from the artifacts the build
  # matrix just attached to the GitHub release, then publishes to Hex. Gated by
  # the `hex` environment: GitHub pauses here for a required reviewer to approve,
  # so you eyeball the release before anything ships. No manual checksum commit,
  # no re-tag. See UPDATE_PROCEDURE.md.
  publish:
    name: Publish to Hex
    needs: build_release
    runs-on: ubuntu-latest
    environment: hex
    env:
      # Build the NIF locally so `mix compile` doesn't try to download a NIF
      # whose checksum isn't generated yet (the chicken-and-egg).
      LANGELIC_EPUB_BUILD: "true"
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"

      - uses: dtolnay/rust-toolchain@stable

      - name: Fetch dependencies
        run: mix deps.get

      - name: Generate checksums from the released artifacts
        run: mix rustler_precompiled.download LangelicEpub.Native --all --print

      - name: Publish package to Hex
        run: mix hex.publish package --yes

      - name: Publish docs to HexDocs
        continue-on-error: true
        run: mix hex.publish docs --yes
